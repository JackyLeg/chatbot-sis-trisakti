version: "3.1"

actions:
- action_menu_majoringApplication

slots:
  menu_majoringApplication:
    type: categorical
    values:
      - Prosedur Majoring Application
      - Persyaratan Majoring Application
      - Transaksi Majoring Application
      - Hasil Majoring Application
    mappings:
      - type: from_llm

  menu_majoringApplication_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_majoringApplication:
    - text: "Please select one of the following majoring application options:"
      translation:
        id: "Silakan pilih salah satu opsi majoring application berikut:"
      buttons:
        - title: "Prosedur Majoring Application"
          payload: Prosedur Majoring Application
        - title: "Persyaratan Majoring Application"
          payload: Persyaratan Majoring Application
        - title: "Transaksi Majoring Application"
          payload: Transaksi Majoring Application
        - title: "Hasil Majoring Application"
          payload: Hasil Majoring Application

  utter_ask_menu_majoringApplication_confirmation:
    - text: "You have selected the option: {menu_majoringApplication}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_majoringApplication}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_majoringApplication_cancelled:
    - text: "Okay, let's try again. Please select one of the majoring application options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi majoring application."

  utter_menu_majoringApplication_ok:
    - text: "You have successfully selected the majoring application option: {menu_majoringApplication}."
      translation:
        id: "Anda telah berhasil memilih opsi majoring application: {menu_majoringApplication}."

  utter_answer_prosedur_majoringApplication:
    - text: |
        PROSEDUR MAJORING APPLICATION
        
  utter_answer_persyaratan_majoringApplication:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PERSYARATAN MAJORING APPLICATION (FH)
    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PERSYARATAN MAJORING APPLICATION (FEB)
    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PERSYARATAN MAJORING APPLICATION (FK)
    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PERSYARATAN MAJORING APPLICATION (FKG)
    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PERSYARATAN MAJORING APPLICATION (FTSP)
    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PERSYARATAN MAJORING APPLICATION (FTI)
    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PERSYARATAN MAJORING APPLICATION (FTKE)
    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PERSYARATAN MAJORING APPLICATION (FALTL)
    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PERSYARATAN MAJORING APPLICATION (FSRD)
    - text: |
        PERSYARATAN MAJORING APPLICATION
        
  utter_answer_transaksi_majoringApplication:
    - text: "Silakan lengkapi data pengajuan majoring application dan ajukan permohonan majoring application."

  utter_answer_hasil_majoringApplication:
    - text: "Pengajuan majoring application kamu telah diproses."

  utter_answer_error_majoringApplication:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."