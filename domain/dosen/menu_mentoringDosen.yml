version: "3.1"

actions:
- action_menu_mentoringDosen

slots:
  menu_mentoringDosen:
    type: categorical
    values:
      - Prosedur Mentoring Dosen
      - Persyaratan Mentoring Dosen
      - Transaksi Mentoring Dosen
      - Hasil Mentoring Dosen
    mappings:
      - type: from_llm

  menu_mentoringDosen_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_mentoringDosen:
    - text: "Please select one of the following Mentoring Dosen options:"
      translation:
        id: "Silakan pilih salah satu opsi Mentoring Dosen berikut:"
      buttons:
        - title: "Prosedur Mentoring Dosen"
          payload: Prosedur Mentoring Dosen
        - title: "Persyaratan Mentoring Dosen"
          payload: Persyaratan Mentoring Dosen
        - title: "Transaksi Mentoring Dosen"
          payload: Transaksi Mentoring Dosen
        - title: "Hasil Mentoring Dosen"
          payload: Hasil Mentoring Dosen

  utter_ask_menu_mentoringDosen_confirmation:
    - text: "You have selected the option: {menu_mentoringDosen}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_mentoringDosen}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_mentoringDosen_cancelled:
    - text: "Okay, let's try again. Please select one of the Mentoring Dosen options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi Mentoring Dosen."

  utter_menu_mentoringDosen_ok:
    - text: "You have successfully selected the Mentoring Dosen option: {menu_mentoringDosen}."
      translation:
        id: "Anda telah berhasil memilih opsi Mentoring Dosen: {menu_mentoringDosen}."

  utter_answer_prosedur_mentoringDosen:
    - text: |
        PROSEDUR MENTORING DOSEN
        
  utter_answer_persyaratan_mentoringDosen:
    - text: |
        PERSYARATAN MENTORING DOSEN

  utter_answer_transaksi_mentoringDosen:
    - text: "Silakan lengkapi data Mentoring Dosen."

  utter_answer_hasil_mentoringDosen:
    - text: "Pengajuan Mentoring Dosen kamu telah diproses."

  utter_answer_error_mentoringDosen:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."
