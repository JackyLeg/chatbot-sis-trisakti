version: "3.1"

actions:
- action_menu_biodataMahasiswa

slots:
  menu_biodataMahasiswa:
    type: categorical
    values:
      - Prosedur Biodata Mahasiswa
      - Persyaratan Biodata Mahasiswa
      - Transaksi Biodata Mahasiswa
      - Hasil Biodata Mahasiswa
    mappings:
      - type: from_llm

  menu_biodataMahasiswa_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_biodataMahasiswa:
    - text: "Please select one of the following Biodata Mahasiswa options:"
      translation:
        id: "Silakan pilih salah satu opsi Biodata Mahasiswa berikut:"
      buttons:
        - title: "Prosedur Biodata Mahasiswa"
          payload: Prosedur Biodata Mahasiswa
        - title: "Persyaratan Biodata Mahasiswa"
          payload: Persyaratan Biodata Mahasiswa
        - title: "Transaksi Biodata Mahasiswa"
          payload: Transaksi Biodata Mahasiswa
        - title: "Hasil Biodata Mahasiswa"
          payload: Hasil Biodata Mahasiswa

  utter_ask_menu_biodataMahasiswa_confirmation:
    - text: "You have selected the option: {menu_biodataMahasiswa}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_biodataMahasiswa}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_biodataMahasiswa_cancelled:
    - text: "Okay, let's try again. Please select one of the Biodata Mahasiswa options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi Biodata Mahasiswa."

  utter_menu_biodataMahasiswa_ok:
    - text: "You have successfully selected the Biodata Mahasiswa option: {menu_biodataMahasiswa}."
      translation:
        id: "Anda telah berhasil memilih opsi Biodata Mahasiswa: {menu_biodataMahasiswa}."

  utter_answer_prosedur_biodataMahasiswa:
    - text: |
        PROSEDUR BIODATA MAHASISWA
        
  utter_answer_persyaratan_biodataMahasiswa:
    - text: |
        PERSYARATAN BIODATA MAHASISWA

  utter_answer_transaksi_biodataMahasiswa:
    - text: "Silakan lengkapi data Biodata Mahasiswa."

  utter_answer_hasil_biodataMahasiswa:
    - text: "Pengajuan Biodata Mahasiswa kamu telah diproses."

  utter_answer_error_biodataMahasiswa:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."
