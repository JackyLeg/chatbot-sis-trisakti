version: "3.1"

actions:
- action_menu_tugasAkhir

slots:
  menu_tugasAkhir:
    type: categorical
    values:
      - Prosedur Tugas Akhir
      - Persyaratan Tugas Akhir
      - Transaksi Tugas Akhir
      - Hasil Tugas Akhir
    mappings:
      - type: from_llm

  menu_tugasAkhir_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_tugasAkhir:
    - text: "Please select one of the following tugas akhir options:"
      translation:
        id: "Silakan pilih salah satu opsi tugas akhir berikut:"
      buttons:
        - title: "Prosedur Tugas Akhir"
          payload: Prosedur Tugas Akhir
        - title: "Persyaratan Tugas Akhir"
          payload: Persyaratan Tugas Akhir
        - title: "Transaksi Tugas Akhir"
          payload: Transaksi Tugas Akhir
        - title: "Hasil Tugas Akhir"
          payload: Hasil Tugas Akhir

  utter_ask_menu_tugasAkhir_confirmation:
    - text: "You have selected the option: {menu_tugasAkhir}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_tugasAkhir}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_tugasAkhir_cancelled:
    - text: "Okay, let's try again. Please select one of the tugas akhir options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi tugas akhir."

  utter_menu_tugasAkhir_ok:
    - text: "You have successfully selected the tugas akhir option: {menu_tugasAkhir}."
      translation:
        id: "Anda telah berhasil memilih opsi tugas akhir: {menu_tugasAkhir}."

  utter_answer_prosedur_tugasAkhir:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PROSEDUR TUGAS AKHIR (FH)

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PROSEDUR TUGAS AKHIR (FEB)

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PROSEDUR TUGAS AKHIR (FK)

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PROSEDUR TUGAS AKHIR (FKG)

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PROSEDUR TUGAS AKHIR (FTSP)

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PROSEDUR TUGAS AKHIR (FTI)

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PROSEDUR TUGAS AKHIR (FTKE)

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PROSEDUR TUGAS AKHIR (FALTL)

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PROSEDUR TUGAS AKHIR (FSRD)

    - text: |
        PROSEDUR TUGAS AKHIR
        
  utter_answer_persyaratan_tugasAkhir:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PERSYARATAN TUGAS AKHIR (FH)

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PERSYARATAN TUGAS AKHIR (FEB)

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PERSYARATAN TUGAS AKHIR (FK)

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PERSYARATAN TUGAS AKHIR (FKG)

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PERSYARATAN TUGAS AKHIR (FTSP)

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PERSYARATAN TUGAS AKHIR (FTI)

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PERSYARATAN TUGAS AKHIR (FTKE)

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PERSYARATAN TUGAS AKHIR (FALTL)

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PERSYARATAN TUGAS AKHIR (FSRD)

    - text: |
        PERSYARATAN TUGAS AKHIR
        1. Syarat Umum
          - Masa Studi: Telah mengikuti kegiatan akademik minimal 2 semester.
              Durasi Maksimal: Program D4, S1, dan S3: Maksimal 4 semester.
          - Program D3, Profesi, dan S2: Maksimal 2 semester.
          - Ketentuan Pengambilan: Cuti dapat diambil per semester atau maksimal 2 semester berturut-turut.
        2. Kelengkapan Dokumen (Cuti Terencana)
          Mahasiswa wajib menyerahkan Surat Permohonan Cuti kepada Dekan yang ditandatangani oleh mahasiswa dan orang tua/wali, berisi:
          - Data diri lengkap (Nama, NIM, Alamat, Fakultas/Jurusan).
          - Alasan pengajuan cuti yang jelas.
          - Periode waktu cuti (semester mulai dan berakhir).
        3. Syarat Khusus (Berdasarkan Kondisi)
          - Karena Sakit: Melampirkan Surat Keterangan Rawat Inap (minimal sakit 1 bulan atau setara 4 kali tatap muka berturut-turut).
          - Bela/Tugas Negara & Universitas: Melampirkan Surat Tugas dari Wakil Rektor Bidang Kemahasiswaan.
          - Cuti Tidak Terencana: Untuk aktif kembali, mahasiswa wajib melampirkan Laporan Kronologis Kejadian yang ditandatangani orang tua/wali dan Dosen Wali, serta menyelesaikan seluruh kewajiban administrasi keuangan.

        *Catatan: Pastikan seluruh kewajiban administrasi keuangan pada semester sebelumnya telah lunas sebelum mengajukan permohonan.

  utter_answer_transaksi_tugasAkhir:
    - text: "Silakan lengkapi data pengajuan tugas akhir dan ajukan permohonan tugas akhir."

  utter_answer_hasil_tugasAkhir:
    - text: "Pengajuan tugas akhir kamu telah diproses."

  utter_answer_error_tugasAkhir:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."