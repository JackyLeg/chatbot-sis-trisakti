version: "3.1"

actions:
- action_menu_TAskripsi

slots:
  menu_TAskripsi:
    type: categorical
    values:
      - Prosedur TAskripsi
      - Persyaratan TAskripsi
      - Transaksi TAskripsi
      - Hasil TAskripsi
    mappings:
      - type: from_llm

  menu_TAskripsi_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_TAskripsi:
    - text: "Please select one of the following TAskripsi options:"
      translation:
        id: "Silakan pilih salah satu opsi TAskripsi berikut:"
      buttons:
        - title: "Prosedur TAskripsi"
          payload: Prosedur TAskripsi
        - title: "Persyaratan TAskripsi"
          payload: Persyaratan TAskripsi
        - title: "Transaksi TAskripsi"
          payload: Transaksi TAskripsi
        - title: "Hasil TAskripsi"
          payload: Hasil TAskripsi

  utter_ask_menu_TAskripsi_confirmation:
    - text: "You have selected the option: {menu_TAskripsi}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_TAskripsi}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_TAskripsi_cancelled:
    - text: "Okay, let's try again. Please select one of the TAskripsi options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi TAskripsi."

  utter_menu_TAskripsi_ok:
    - text: "You have successfully selected the TAskripsi option: {menu_TAskripsi}."
      translation:
        id: "Anda telah berhasil memilih opsi TAskripsi: {menu_TAskripsi}."

  utter_answer_prosedur_TAskripsi:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PROSEDUR PENGISIAN SKPI (FH)

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PROSEDUR PENGISIAN SKPI (FEB)

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PROSEDUR PENGISIAN SKPI (FK)

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PROSEDUR PENGISIAN SKPI (FKG)

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PROSEDUR PENGISIAN SKPI (FTSP)

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PROSEDUR PENGISIAN SKPI (FTI)

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PROSEDUR PENGISIAN SKPI (FTKE)

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PROSEDUR PENGISIAN SKPI (FALTL)

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PROSEDUR PENGISIAN SKPI (FSRD)

    - text: |
        PROSEDUR TA SKRIPSI
        
  utter_answer_persyaratan_TAskripsi:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PERSYARATAN PENGISIAN SKPI (FH)

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PERSYARATAN PENGISIAN SKPI (FEB)

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PERSYARATAN PENGISIAN SKPI (FK)

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PERSYARATAN PENGISIAN SKPI (FKG)

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PERSYARATAN PENGISIAN SKPI (FTSP)

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PERSYARATAN PENGISIAN SKPI (FTI)

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PERSYARATAN PENGISIAN SKPI (FTKE)

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PERSYARATAN PENGISIAN SKPI (FALTL)

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PERSYARATAN PENGISIAN SKPI (FSRD)

    - text: |
        PERSYARATAN TA SKRIPSI
        
  utter_answer_transaksi_TAskripsi:
    - text: "Silakan lengkapi data pengajuan TAskripsi dan ajukan permohonan TAskripsi."

  utter_answer_hasil_TAskripsi:
    - text: "Pengajuan TAskripsi kamu telah diproses."

  utter_answer_error_TAskripsi:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."