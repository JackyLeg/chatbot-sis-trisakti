version: "3.1"

actions:
- action_menu_pertukaranMahasiswa: {send_domain: true}

slots:
  menu_pertukaranMahasiswa:
    type: categorical
    values:
      - Prosedur Pertukaran Mahasiswa
      - Persyaratan Pertukaran Mahasiswa
      - Transaksi Pertukaran Mahasiswa
      - Hasil Pertukaran Mahasiswa
    mappings:
      - type: from_llm

  menu_pertukaranMahasiswa_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_pertukaranMahasiswa:
    - text: "Please select one of the following pertukaran mahasiswa options:"
      translation:
        id: "Silakan pilih salah satu opsi pertukaran mahasiswa berikut:"
      buttons:
        - title: "Prosedur Pertukaran Mahasiswa"
          payload: Prosedur Pertukaran Mahasiswa
        - title: "Persyaratan Pertukaran Mahasiswa"
          payload: Persyaratan Pertukaran Mahasiswa
        - title: "Transaksi Pertukaran Mahasiswa"
          payload: Transaksi Pertukaran Mahasiswa
        - title: "Hasil Pertukaran Mahasiswa"
          payload: Hasil Pertukaran Mahasiswa

  utter_ask_menu_pertukaranMahasiswa_confirmation:
    - text: "You have selected the option: {menu_pertukaranMahasiswa}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_pertukaranMahasiswa}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_pertukaranMahasiswa_cancelled:
    - text: "Okay, let's try again. Please select one of the pertukaran mahasiswa options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi pertukaran mahasiswa."

  utter_menu_pertukaranMahasiswa_ok:
    - text: "You have successfully selected the pertukaran mahasiswa option: {menu_pertukaranMahasiswa}."
      translation:
        id: "Anda telah berhasil memilih opsi pertukaran mahasiswa: {menu_pertukaranMahasiswa}."

  utter_answer_prosedur_pertukaranMahasiswa:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PROSEDUR PERTUKARAN MAHASISWA (FH)
      custom:
        context: "pertukaranMahasiswa"

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PROSEDUR PERTUKARAN MAHASISWA (FEB)
      custom:
        context: "pertukaranMahasiswa"

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PROSEDUR PERTUKARAN MAHASISWA (FK)
      custom:
        context: "pertukaranMahasiswa"

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PROSEDUR PERTUKARAN MAHASISWA (FKG)
      custom:
        context: "pertukaranMahasiswa"

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PROSEDUR PERTUKARAN MAHASISWA (FTSP)
      custom:
        context: "pertukaranMahasiswa"

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PROSEDUR PERTUKARAN MAHASISWA (FTI)
      custom:
        context: "pertukaranMahasiswa"

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
