        PROSEDUR PERTUKARAN MAHASISWA (FTKE)
      custom:
        context: "pertukaranMahasiswa"

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PROSEDUR PERTUKARAN MAHASISWA (FALTL)
      custom:
        context: "pertukaranMahasiswa"

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PROSEDUR PERTUKARAN MAHASISWA (FSRD)
      custom:
        context: "pertukaranMahasiswa"

    - text: |
        PROSEDUR PERTUKARAN MAHASISWA
      custom:
        context: "pertukaranMahasiswa"
        
