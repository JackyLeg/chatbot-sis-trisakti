    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PERSYARATAN PERTUKARAN MAHASISWA (FSRD)
      custom:
        context: "pertukaranMahasiswa"

    - text: |
