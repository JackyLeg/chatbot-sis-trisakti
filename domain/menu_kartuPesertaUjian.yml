version: "3.1"

actions:
- action_menu_kartuPesertaUjian

slots:
  menu_kartuPesertaUjian:
    type: categorical
    values:
      - Prosedur Kartu Peserta Ujian
      - Persyaratan Kartu Peserta Ujian
      - Transaksi Kartu Peserta Ujian
      - Hasil Kartu Peserta Ujian
    mappings:
      - type: from_llm

  menu_kartuPesertaUjian_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_kartuPesertaUjian:
    - text: "Please select one of the following kartu peserta ujian options:"
      translation:
        id: "Silakan pilih salah satu opsi kartu peserta ujian berikut:"
      buttons:
        - title: "Prosedur Kartu Peserta Ujian"
          payload: Prosedur Kartu Peserta Ujian
        - title: "Persyaratan Kartu Peserta Ujian"
          payload: Persyaratan Kartu Peserta Ujian
        - title: "Transaksi Kartu Peserta Ujian"
          payload: Transaksi Kartu Peserta Ujian
        - title: "Hasil Kartu Peserta Ujian"
          payload: Hasil Kartu Peserta Ujian

  utter_ask_menu_kartuPesertaUjian_confirmation:
    - text: "You have selected the option: {menu_kartuPesertaUjian}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_kartuPesertaUjian}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_kartuPesertaUjian_cancelled:
    - text: "Okay, let's try again. Please select one of the kartu peserta ujian options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi kartu peserta ujian."

  utter_menu_kartuPesertaUjian_ok:
    - text: "You have successfully selected the kartu peserta ujian option: {menu_kartuPesertaUjian}."
      translation:
        id: "Anda telah berhasil memilih opsi kartu peserta ujian: {menu_kartuPesertaUjian}."

  utter_answer_prosedur_kartuPesertaUjian:
    - text: |
        PROSEDUR KPU
        
  utter_answer_persyaratan_kartuPesertaUjian:
    - text: |
        PERSYARATAN KPU
        
  utter_answer_transaksi_kartuPesertaUjian:
    - text: "Silakan lengkapi data pengajuan kartu peserta ujian dan ajukan permohonan kartu peserta ujian."

  utter_answer_hasil_kartuPesertaUjian:
    - text: "Pengajuan kartu peserta ujian kamu telah diproses."

  utter_answer_error_kartuPesertaUjian:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."