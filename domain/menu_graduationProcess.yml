version: "3.1"

actions:
- action_menu_graduationProcess

slots:
  menu_graduationProcess:
    type: categorical
    values:
      - Prosedur Graduation Process
      - Persyaratan Graduation Process
      - Transaksi Graduation Process
      - Hasil Graduation Process
    mappings:
      - type: from_llm

  menu_graduationProcess_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_graduationProcess:
    - text: "Please select one of the following graduation process options:"
      translation:
        id: "Silakan pilih salah satu opsi proses kelulusan berikut:"
      buttons:
        - title: "Prosedur Graduation Process"
          payload: Prosedur Graduation Process
        - title: "Persyaratan Graduation Process"
          payload: Persyaratan Graduation Process
        - title: "Transaksi Graduation Process"
          payload: Transaksi Graduation Process
        - title: "Hasil Graduation Process"
          payload: Hasil Graduation Process

  utter_ask_menu_graduationProcess_confirmation:
    - text: "You have selected the option: {menu_graduationProcess}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_graduationProcess}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_graduationProcess_cancelled:
    - text: "Okay, let's try again. Please select one of the graduation process options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi proses kelulusan."

  utter_menu_graduationProcess_ok:
    - text: "You have successfully selected the graduation process option: {menu_graduationProcess}."
      translation:
        id: "Anda telah berhasil memilih opsi proses kelulusan: {menu_graduationProcess}."

  utter_answer_prosedur_graduationProcess:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PROSEDUR GRADUATION PROCESS (FH)

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PROSEDUR GRADUATION PROCESS (FEB)

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PROSEDUR GRADUATION PROCESS (FK)

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PROSEDUR GRADUATION PROCESS (FKG)

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PROSEDUR GRADUATION PROCESS (FTSP)

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PROSEDUR GRADUATION PROCESS (FTI)

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PROSEDUR GRADUATION PROCESS (FTKE)

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PROSEDUR GRADUATION PROCESS (FALTL)

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PROSEDUR GRADUATION PROCESS (FSRD)

    - text: |
        PROSEDUR GRADUATION PROCESS
        
  utter_answer_persyaratan_graduationProcess:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PERSYARATAN GRADUATION PROCESS (FH)

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PERSYARATAN GRADUATION PROCESS (FEB)

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PERSYARATAN GRADUATION PROCESS (FK)

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PERSYARATAN GRADUATION PROCESS (FKG)

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PERSYARATAN GRADUATION PROCESS (FTSP)

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PERSYARATAN GRADUATION PROCESS (FTI)

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PERSYARATAN GRADUATION PROCESS (FTKE)

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PERSYARATAN GRADUATION PROCESS (FALTL)

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PERSYARATAN GRADUATION PROCESS (FSRD)

    - text: |
        PERSYARATAN GRADUATION PROCESS
        1. Syarat Umum
          - Masa Studi: Telah mengikuti kegiatan akademik minimal 2 semester.
              Durasi Maksimal: Program D4, S1, dan S3: Maksimal 4 semester.
          - Program D3, Profesi, dan S2: Maksimal 2 semester.
          - Ketentuan Pengambilan: Cuti dapat diambil per semester atau maksimal 2 semester berturut-turut.
        2. Kelengkapan Dokumen (Cuti Terencana)
          Mahasiswa wajib menyerahkan Surat Permohonan Cuti kepada Dekan yang ditandatangani oleh mahasiswa dan orang tua/wali, berisi:
          - Data diri lengkap (Nama, NIM, Alamat, Fakultas/Jurusan).
          - Alasan pengajuan cuti yang jelas.
          - Periode waktu cuti (semester mulai dan berakhir).
        3. Syarat Khusus (Berdasarkan Kondisi)
          - Karena Sakit: Melampirkan Surat Keterangan Rawat Inap (minimal sakit 1 bulan atau setara 4 kali tatap muka berturut-turut).
          - Bela/Tugas Negara & Universitas: Melampirkan Surat Tugas dari Wakil Rektor Bidang Kemahasiswaan.
          - Cuti Tidak Terencana: Untuk aktif kembali, mahasiswa wajib melampirkan Laporan Kronologis Kejadian yang ditandatangani orang tua/wali dan Dosen Wali, serta menyelesaikan seluruh kewajiban administrasi keuangan.

        *Catatan: Pastikan seluruh kewajiban administrasi keuangan pada semester sebelumnya telah lunas sebelum mengajukan permohonan.

  utter_answer_transaksi_graduationProcess:
    - text: "Silakan lengkapi data pengajuan proses kelulusan dan ajukan permohonan kelulusan."

  utter_answer_hasil_graduationProcess:
    - text: "Pengajuan proses kelulusan kamu telah diproses."

  utter_answer_error_graduationProcess:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."