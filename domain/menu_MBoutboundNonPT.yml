version: "3.1"

actions:
- action_menu_MBoutboundNonPT: {send_domain: true}

slots:
  menu_MBoutboundNonPT:
    type: categorical
    values:
      - Prosedur MB Outbound Non PT
      - Persyaratan MB Outbound Non PT
      - Transaksi MB Outbound Non PT
      - Hasil MB Outbound Non PT
    mappings:
      - type: from_llm

  menu_MBoutboundNonPT_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_MBoutboundNonPT:
    - text: "Please select one of the following MB Outbound Non PT options:"
      translation:
        id: "Silakan pilih salah satu opsi MB Outbound Non PT berikut:"
      buttons:
        - title: "Prosedur MB Outbound Non PT"
          payload: Prosedur MB Outbound Non PT
        - title: "Persyaratan MB Outbound Non PT"
          payload: Persyaratan MB Outbound Non PT
        - title: "Transaksi MB Outbound Non PT"
          payload: Transaksi MB Outbound Non PT
        - title: "Hasil MB Outbound Non PT"
          payload: Hasil MB Outbound Non PT

  utter_ask_menu_MBoutboundNonPT_confirmation:
    - text: "You have selected the option: {menu_MBoutboundNonPT}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_MBoutboundNonPT}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_MBoutboundNonPT_cancelled:
    - text: "Okay, let's try again. Please select one of the MB Outbound Non PT options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi MB Outbound Non PT."

  utter_menu_MBoutboundNonPT_ok:
    - text: "You have successfully selected the MB Outbound Non PT option: {menu_MBoutboundNonPT}."
      translation:
        id: "Anda telah berhasil memilih opsi MB Outbound Non PT: {menu_MBoutboundNonPT}."

  utter_answer_prosedur_MBoutboundNonPT:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PROSEDUR MB OUTBOUND NON PT (FH)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PROSEDUR MB OUTBOUND NON PT (FEB)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PROSEDUR MB OUTBOUND NON PT (FK)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PROSEDUR MB OUTBOUND NON PT (FKG)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PROSEDUR MB OUTBOUND NON PT (FTSP)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PROSEDUR MB OUTBOUND NON PT (FTI)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PROSEDUR MB OUTBOUND NON PT (FTKE)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PROSEDUR MB OUTBOUND NON PT (FALTL)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PROSEDUR MB OUTBOUND NON PT (FSRD)
      custom:
        context: "MBOutboundNonPT"

    - text: |
        PROSEDUR MB OUTBOUND NON PT
      custom:
        context: "MBOutboundNonPT"
        
  utter_answer_persyaratan_MBoutboundNonPT:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PERSYARATAN MB OUTBOUND NON PT (FH)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PERSYARATAN MB OUTBOUND NON PT (FEB)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PERSYARATAN MB OUTBOUND NON PT (FK)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PERSYARATAN MB OUTBOUND NON PT (FKG)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PERSYARATAN MB OUTBOUND NON PT (FTSP)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PERSYARATAN MB OUTBOUND NON PT (FTI)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PERSYARATAN MB OUTBOUND NON PT (FTKE)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PERSYARATAN MB OUTBOUND NON PT (FALTL)
      custom:
        context: "MBOutboundNonPT"

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PERSYARATAN MB OUTBOUND NON PT (FSRD)
      custom:
        context: "MBOutboundNonPT"

    - text: |
        PERSYARATAN MB OUTBOUND NON PT
      custom:
        context: "MBOutboundNonPT"
        
  utter_answer_transaksi_MBoutboundNonPT:
    - text: "Silakan lengkapi data pengajuan MB Outbound Non PT dan ajukan permohonan MB Outbound Non PT."

  utter_answer_hasil_MBoutboundNonPT:
    - text: "Pengajuan MB Outbound Non PT kamu telah diproses."

  utter_answer_error_MBoutboundNonPT:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."