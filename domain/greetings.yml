version: "3.1"

actions:
- hello_world

slots:
  name:
    type: text
    mappings:
      - type: from_llm

responses:
  utter_ask_name:
    - text: "May I know your name?"
      translation:
        id: "Siapa nama Anda?"

  utter_greet:
    - text: "Hello, {name}! How can I assist you today?"
      translation:
        id: "Halo, {name}! Bagaimana saya bisa membantu Anda hari ini?"

  utter_provide_info:
    - text: |
        I can help you with information about menus on [student.trisakti.ac.id](https://student.trisakti.ac.id/).
        You can ask me about:
        - Academic leave
        - Study card
        - Payment
        - Study results
        - And many more!
      translation:
        id: |
          Saya dapat memberikan informasi tentang menu di [student.trisakti.ac.id](https://student.trisakti.ac.id/). 
          Anda dapat bertanya kepada saya tentang:
          - Cuti Akademik
          - Kartu Rencana Studi (KRS)
          - Pembayaran/Keuangan
          - Hasil Studi (KHS atau Transkrip)
          - dan banyak lagi!

  utter_imabot:
    - text: "I am Imabot, your assistant for navigating the student portal."
      translation:
        id: "Saya adalah UsaktiBot, asisten Anda untuk menavigasi portal mahasiswa."