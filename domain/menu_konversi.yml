version: "3.1"

actions:
- action_menu_konversi

slots:
  menu_konversi:
    type: categorical
    values:
      - Prosedur Konversi
      - Persyaratan Konversi
      - Transaksi Konversi
      - Hasil Konversi
    mappings:
      - type: from_llm

  menu_konversi_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_konversi:
    - text: "Please select one of the following konversi options:"
      translation:
        id: "Silakan pilih salah satu opsi konversi berikut:"
      buttons:
        - title: "Prosedur Konversi"
          payload: Prosedur Konversi
        - title: "Persyaratan Konversi"
          payload: Persyaratan Konversi
        - title: "Transaksi Konversi"
          payload: Transaksi Konversi
        - title: "Hasil Konversi"
          payload: Hasil Konversi

  utter_ask_menu_konversi_confirmation:
    - text: "You have selected the option: {menu_konversi}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_konversi}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_konversi_cancelled:
    - text: "Okay, let's try again. Please select one of the konversi options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi konversi."

  utter_menu_konversi_ok:
    - text: "You have successfully selected the konversi option: {menu_konversi}."
      translation:
        id: "Anda telah berhasil memilih opsi konversi: {menu_konversi}."

  utter_answer_prosedur_konversi:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PROSEDUR KONVERSI (FH)

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PROSEDUR KONVERSI (FEB)

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PROSEDUR KONVERSI (FK)

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PROSEDUR KONVERSI (FKG)

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PROSEDUR KONVERSI (FTSP)

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PROSEDUR KONVERSI (FTI)

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PROSEDUR KONVERSI (FTKE)

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PROSEDUR KONVERSI (FALTL)

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PROSEDUR KONVERSI (FSRD)

    - text: |
        PROSEDUR KONVERSI
        
  utter_answer_persyaratan_konversi:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PERSYARATAN KONVERSI (FH)

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PERSYARATAN KONVERSI (FEB)

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PERSYARATAN KONVERSI (FK)

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PERSYARATAN KONVERSI (FKG)

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PERSYARATAN KONVERSI (FTSP)

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PERSYARATAN KONVERSI (FTI)

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PERSYARATAN KONVERSI (FTKE)

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PERSYARATAN KONVERSI (FALTL)

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PERSYARATAN KONVERSI (FSRD)

    - text: |
        PERSYARATAN KONVERSI
        
  utter_answer_transaksi_konversi:
    - text: "Silakan lengkapi data pengajuan konversi dan ajukan permohonan konversi."

  utter_answer_hasil_konversi:
    - text: "Pengajuan konversi kamu telah diproses."

  utter_answer_error_konversi:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."