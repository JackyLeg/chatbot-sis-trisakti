version: "3.1"

actions:
- action_menu_wisuda

slots:
  menu_wisuda:
    type: categorical
    values:
      - Prosedur Wisuda
      - Persyaratan Wisuda
      - Transaksi Wisuda
      - Hasil Wisuda
    mappings:
      - type: from_llm

  menu_wisuda_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_wisuda:
    - text: "Please select one of the following wisuda options:"
      translation:
        id: "Silakan pilih salah satu opsi wisuda berikut:"
      buttons:
        - title: "Prosedur Wisuda"
          payload: Prosedur Wisuda
        - title: "Persyaratan Wisuda"
          payload: Persyaratan Wisuda
        - title: "Transaksi Wisuda"
          payload: Transaksi Wisuda
        - title: "Hasil Wisuda"
          payload: Hasil Wisuda

  utter_ask_menu_wisuda_confirmation:
    - text: "You have selected the option: {menu_wisuda}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_wisuda}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_wisuda_cancelled:
    - text: "Okay, let's try again. Please select one of the wisuda options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi wisuda."

  utter_menu_wisuda_ok:
    - text: "You have successfully selected the wisuda option: {menu_wisuda}."
      translation:
        id: "Anda telah berhasil memilih opsi wisuda: {menu_wisuda}."

  utter_answer_prosedur_wisuda:
    - text: |
        PROSEDUR WISUDA
        1. Hadir paling lambat 60 menit sebelum acara dimulai.
        2. Dilarang membawa makanan, minuman, tas berukuran besar, kamera.
        3. Disarankan sarapan atau makan sebelum wisuda bagi sesi pagi dan sesi siang sebelum memasuki ruangan wisuda.
        4. Dilarang merokok sesuai Perda DKI Nomor: 2/2005 tentang larangan merokok dan kawasan dilarang merokok.
        5. Wajib menjaga ketertiban dan kelancaran acara selama acara berlangsung.
        6. Tidak dibenarkan mengaktifkan nada dering handphone selama berada di dalam ruangan.
        7. Tidak dibenarkan meninggalkan ruangan sampai acara selesai.
        8. Wisudawan yang izin ke toilet, harus melapor ke panitia dan meninggalkan topi toga wisuda di bangku masing-masing (secara bergantian maksimal 3 orang).
        9. Untuk Wisudawati yang menggunakan jilbab, dan aksesoris seperti sanggul dan lain sebagainya harap memperhatikan posisi aksesoris tersebut agar tidak menutupi wajah.
        10. Tidak ada aktivitas pemotretan, karena akan dilakukan oleh petugas dokumentasi dari panitia.
        11. Jaga barang bawaan anda, karena panitia tidak bertanggung jawab apabila terjadi kehilangan.
        
  utter_answer_persyaratan_wisuda:
    - text: |
        PERSYARATAN WISUDA
        
  utter_answer_transaksi_wisuda:
    - text: "Silakan lengkapi data pengajuan wisuda dan ajukan permohonan wisuda."

  utter_answer_hasil_wisuda:
    - text: "Pengajuan wisuda kamu telah diproses."

  utter_answer_error_wisuda:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."