version: "3.1"

actions:
- action_menu_wisuda: {send_domain: true}

slots:
  menu_wisuda:
    type: categorical
    values:
      - Prosedur Wisuda
      - Persyaratan Wisuda
      - Transaksi Wisuda
      - Hasil Wisuda
    mappings:
      - type: from_llm

  menu_wisuda_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_wisuda:
    - text: "Please select one of the following wisuda options:"
      translation:
        id: "Silakan pilih salah satu opsi wisuda berikut:"
      buttons:
        - title: "Prosedur Wisuda"
          payload: Prosedur Wisuda
        - title: "Persyaratan Wisuda"
          payload: Persyaratan Wisuda
        - title: "Transaksi Wisuda"
          payload: Transaksi Wisuda
        - title: "Hasil Wisuda"
          payload: Hasil Wisuda

  utter_ask_menu_wisuda_confirmation:
    - text: "You have selected the option: {menu_wisuda}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_wisuda}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_wisuda_cancelled:
    - text: "Okay, let's try again. Please select one of the wisuda options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi wisuda."

  utter_menu_wisuda_ok:
    - text: "You have successfully selected the wisuda option: {menu_wisuda}."
      translation:
        id: "Anda telah berhasil memilih opsi wisuda: {menu_wisuda}."

  utter_answer_prosedur_wisuda:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PROSEDUR WISUDA (FH)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PROSEDUR WISUDA (FEB)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PROSEDUR WISUDA (FK)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PROSEDUR WISUDA (FKG)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PROSEDUR WISUDA (FTSP)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PROSEDUR WISUDA (FTI)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PROSEDUR WISUDA (FTKE)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PROSEDUR WISUDA (FALTL)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PROSEDUR WISUDA (FSRD)
      custom:
        context: "wisuda"

    - text: |
        PROSEDUR WISUDA
      custom:
        context: "wisuda"
        
  utter_answer_persyaratan_wisuda:
    - condition: "slots.fakultas = 'Fakultas Hukum'"
      text: |
        PERSYARATAN WISUDA (FH)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Ekonomi dan Bisnis'"
      text: |
        PERSYARATAN WISUDA (FEB)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Kedokteran'"
      text: |
        PERSYARATAN WISUDA (FK)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Kedokteran Gigi'"
      text: |
        PERSYARATAN WISUDA (FKG)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Teknik Sipil dan Perencanaan'"
      text: |
        PERSYARATAN WISUDA (FTSP)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Teknologi Industri'"
      text: |
        PERSYARATAN WISUDA (FTI)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Teknologi Kebumian dan Energi'"
      text: |
        PERSYARATAN WISUDA (FTKE)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Arsitektur Lanskap dan Teknologi Lingkungan'"
      text: |
        PERSYARATAN WISUDA (FALTL)
      custom:
        context: "wisuda"

    - condition: "slots.fakultas = 'Fakultas Seni Rupa dan Desain'"
      text: |
        PERSYARATAN WISUDA (FSRD)
      custom:
        context: "wisuda"

    - text: |
        PERSYARATAN WISUDA
      custom:
        context: "wisuda"
        
  utter_answer_transaksi_wisuda:
    - text: "Silakan lengkapi data pengajuan wisuda dan ajukan permohonan wisuda."

  utter_answer_hasil_wisuda:
    - text: "Pengajuan wisuda kamu telah diproses."

  utter_answer_error_wisuda:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."