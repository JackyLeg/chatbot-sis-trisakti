version: "3.1"

actions:
- action_menu_fastTrackApp

slots:
  menu_fastTrackApp:
    type: categorical
    values:
      - Prosedur Fast Track App
      - Persyaratan Fast Track App
      - Transaksi Fast Track App
      - Hasil Fast Track App
    mappings:
      - type: from_llm

  menu_fastTrackApp_confirmation:
    type: bool
    mappings:
      - type: from_llm

responses:
  utter_ask_menu_fastTrackApp:
    - text: "Please select one of the following fast track app options:"
      translation:
        id: "Silakan pilih salah satu opsi fast track app berikut:"
      buttons:
        - title: "Prosedur Fast Track App"
          payload: Prosedur Fast Track App
        - title: "Persyaratan Fast Track App"
          payload: Persyaratan Fast Track App
        - title: "Transaksi Fast Track App"
          payload: Transaksi Fast Track App
        - title: "Hasil Fast Track App"
          payload: Hasil Fast Track App

  utter_ask_menu_fastTrackApp_confirmation:
    - text: "You have selected the option: {menu_fastTrackApp}. Is that correct?"
      translation:
        id: "Anda telah memilih opsi: {menu_fastTrackApp}. Apakah itu benar?"
      buttons:
        - title: "Yes"
          payload: Yes, that's correct
          translation:
            id:
              title: "Ya"
              payload: Ya, itu benar
        - title: "No"
          payload: No, I want to change it
          translation:
            id:
              title: "Tidak"
              payload: Tidak, saya ingin mengubahnya

  utter_menu_fastTrackApp_cancelled:
    - text: "Okay, let's try again. Please select one of the fast track app options."
      translation:
        id: "Baik, mari coba lagi. Silakan pilih salah satu opsi fast track app."

  utter_menu_fastTrackApp_ok:
    - text: "You have successfully selected the fast track app option: {menu_fastTrackApp}."
      translation:
        id: "Anda telah berhasil memilih opsi fast track app: {menu_fastTrackApp}."

  utter_answer_prosedur_fastTrackApp:
    - text: |
        PROSEDUR FAST TRACK APP
        
  utter_answer_persyaratan_fastTrackApp:
    - text: |
        PERSYARATAN FAST TRACK APP

  utter_answer_transaksi_fastTrackApp:
    - text: "Silakan lengkapi data pengajuan cuti akademik dan ajukan permohonan cuti."

  utter_answer_hasil_fastTrackApp:
    - text: "Pengajuan cuti akademik kamu telah diproses."

  utter_answer_error_fastTrackApp:
    - text: "Maaf, menu tidak ditemukan. Silakan pilih opsi yang tersedia."