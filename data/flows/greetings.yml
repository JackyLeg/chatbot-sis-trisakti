flows:
  greetings:
    description: greet users when they start a conversation
    persisted_slots:
      - name
    steps:
      - collect: name
        description: the name of the user
      - action: hello_world
  
  provide_capabilities:
    description: |
      explain what the assistant can do and what features are available to users, 
      user may ask "what can you do?" or "apa yang bisa kamu lakukan?"
    steps:
      - action: utter_provide_info
    
  provide_introduction:
    description: |
      introduce the assistant and its purpose, 
      user may ask "who are you?" or "siapa kamu?"
    steps:
      - action: utter_imabot