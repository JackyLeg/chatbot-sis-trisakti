flows:
  absensiUjian:
      name: Absensi Ujian
      description: Help user with Absensi Ujian menus
      steps:
        - id: ask_menu
          collect: menu_absensiUjian
          ask_before_filling: true
          description: |
            User must select one of 4 options for Absensi Ujian.
            there are options like Prosedur Absensi Ujian, Persyaratan Absensi Ujian, Transaksi Absensi Ujian, and Hasil Absensi Ujian.
            while bot not do utter_answer_batal_absensiUjian and if user gets their result, flow will continue to what user want to do next in this menu
          next: menu_confirmation

        - id: menu_confirmation
          collect: menu_absensiUjian_confirmation
          ask_before_filling: true
          next:
          - if: slots.menu_absensiUjian_confirmation is false
            then:
              - action: utter_menu_absensiUjian_cancelled
                next: ask_menu
          - else: continue_flow

        - id: continue_flow
          action: action_menu_absensiUjian
          next:
            - if: slots.return_value = "Prosedur Absensi Ujian"
              then: 
                - action: utter_answer_prosedur_absensiUjian
                  next: ask_menu
            - if: slots.return_value = "Persyaratan Absensi Ujian"
              then: 
                - action: utter_answer_persyaratan_absensiUjian
                  next: ask_menu
            - if: slots.return_value = "Transaksi Absensi Ujian"
              then: 
                - action: utter_answer_transaksi_absensiUjian
                  next: ask_menu
            - if: slots.return_value = "Hasil Absensi Ujian"
              then: 
                - action: utter_answer_hasil_absensiUjian
                  next: ask_menu
            - else: 
                - action: utter_answer_error_absensiUjian
                  next: ask_menu
