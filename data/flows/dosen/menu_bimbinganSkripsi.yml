flows:
  bimbinganSkripsi:
      name: Bimbingan Skripsi
      description: Help user with Bimbingan Skripsi menus
      steps:
        - id: ask_menu
          collect: menu_bimbinganSkripsi
          ask_before_filling: true
          description: |
            User must select one of 4 options for Bimbingan Skripsi.
            there are options like Prosedur Bimbingan Skripsi, Persyaratan Bimbingan Skripsi, Transaksi Bimbingan Skripsi, and Hasil Bimbingan Skripsi.
            while bot not do utter_answer_batal_bimbinganSkripsi and if user gets their result, flow will continue to what user want to do next in this menu
          next: menu_confirmation

        - id: menu_confirmation
          collect: menu_bimbinganSkripsi_confirmation
          ask_before_filling: true
          next:
          - if: slots.menu_bimbinganSkripsi_confirmation is false
            then:
              - action: utter_menu_bimbinganSkripsi_cancelled
                next: ask_menu
          - else: continue_flow

        - id: continue_flow
          action: action_menu_bimbinganSkripsi
          next:
            - if: slots.return_value = "api_success"
              then: ask_menu
            - if: slots.return_value = "Prosedur Bimbingan Skripsi"
              then: 
                - action: utter_answer_prosedur_bimbinganSkripsi
                  next: ask_menu
            - if: slots.return_value = "Persyaratan Bimbingan Skripsi"
              then: 
                - action: utter_answer_persyaratan_bimbinganSkripsi
                  next: ask_menu
            - if: slots.return_value = "Transaksi Bimbingan Skripsi"
              then: 
                - action: utter_answer_transaksi_bimbinganSkripsi
                  next: ask_menu
            - if: slots.return_value = "Hasil Bimbingan Skripsi"
              then: 
                - action: utter_answer_hasil_bimbinganSkripsi
                  next: ask_menu
            - else: 
                - action: utter_answer_error_bimbinganSkripsi
                  next: ask_menu
