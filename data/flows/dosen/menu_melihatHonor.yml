flows:
  melihatHonor:
      name: Melihat Honor
      description: Help user with Melihat Honor menus
      steps:
        - id: ask_menu
          collect: menu_melihatHonor
          ask_before_filling: true
          description: |
            User must select one of 4 options for Melihat Honor.
            there are options like Prosedur Melihat Honor, Persyaratan Melihat Honor, Transaksi Melihat Honor, and Hasil Melihat Honor.
            while bot not do utter_answer_batal_melihatHonor and if user gets their result, flow will continue to what user want to do next in this menu
          next: menu_confirmation

        - id: menu_confirmation
          collect: menu_melihatHonor_confirmation
          ask_before_filling: true
          next:
          - if: slots.menu_melihatHonor_confirmation is false
            then:
              - action: utter_menu_melihatHonor_cancelled
                next: ask_menu
          - else: continue_flow

        - id: continue_flow
          action: action_menu_melihatHonor
          next:
            - if: slots.return_value = "api_success"
              then: ask_menu
            - if: slots.return_value = "Prosedur Melihat Honor"
              then: 
                - action: utter_answer_prosedur_melihatHonor
                  next: ask_menu
            - if: slots.return_value = "Persyaratan Melihat Honor"
              then: 
                - action: utter_answer_persyaratan_melihatHonor
                  next: ask_menu
            - if: slots.return_value = "Transaksi Melihat Honor"
              then: 
                - action: utter_answer_transaksi_melihatHonor
                  next: ask_menu
            - if: slots.return_value = "Hasil Melihat Honor"
              then: 
                - action: utter_answer_hasil_melihatHonor
                  next: ask_menu
            - else: 
                - action: utter_answer_error_melihatHonor
                  next: ask_menu
