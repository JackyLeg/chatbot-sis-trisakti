flows:
  konseling:
      name: Konseling
      description: Help user with konseling menus
      steps:
        - id: ask_menu
          collect: menu_konseling
          ask_before_filling: true
          description: |
            User must select one of 4 options for konseling.
            there are options like Prosedur Konseling, Persyaratan Konseling, Transaksi Konseling, and Hasil Konseling.
            while bot not do utter_answer_batal_konseling and if user gets their result, flow will continue to what user want to do next in this menu
          next: menu_confirmation

        - id: menu_confirmation
          collect: menu_konseling_confirmation
          ask_before_filling: true
          next:
          - if: slots.menu_konseling_confirmation is false
            then:
              - action: utter_menu_konseling_cancelled
                next: ask_menu
          - else: continue_flow

        - id: continue_flow
          action: action_menu_konseling
          next:
            - if: slots.return_value = "Prosedur Konseling"
              then: 
                - action: utter_answer_prosedur_konseling
                  next: ask_menu
            - if: slots.return_value = "Persyaratan Konseling"
              then: 
                - action: utter_answer_persyaratan_konseling
                  next: ask_menu
            - if: slots.return_value = "Transaksi Konseling"
              then: 
                - action: utter_answer_transaksi_konseling
                  next: ask_menu
            - if: slots.return_value = "Hasil Konseling"
              then: 
                - action: utter_answer_hasil_konseling
                  next: ask_menu
            - else: 
                - action: utter_answer_error_konseling
                  next: ask_menu
            