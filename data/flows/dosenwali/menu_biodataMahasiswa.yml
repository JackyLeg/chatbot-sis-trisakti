flows:
  biodataMahasiswa:
      name: Biodata Mahasiswa
      description: Help user with Biodata Mahasiswa menus
      steps:
        - id: ask_menu
          collect: menu_biodataMahasiswa
          ask_before_filling: true
          description: |
            User must select one of 4 options for Biodata Mahasiswa.
            there are options like Prosedur Biodata Mahasiswa, Persyaratan Biodata Mahasiswa, Transaksi Biodata Mahasiswa, and Hasil Biodata Mahasiswa.
            while bot not do utter_answer_batal_biodataMahasiswa and if user gets their result, flow will continue to what user want to do next in this menu
          next: menu_confirmation

        - id: menu_confirmation
          collect: menu_biodataMahasiswa_confirmation
          ask_before_filling: true
          next:
          - if: slots.menu_biodataMahasiswa_confirmation is false
            then:
              - action: utter_menu_biodataMahasiswa_cancelled
                next: ask_menu
          - else: continue_flow

        - id: continue_flow
          action: action_menu_biodataMahasiswa
          next:
            - if: slots.return_value = "Prosedur Biodata Mahasiswa"
              then: 
                - action: utter_answer_prosedur_biodataMahasiswa
                  next: ask_menu
            - if: slots.return_value = "Persyaratan Biodata Mahasiswa"
              then: 
                - action: utter_answer_persyaratan_biodataMahasiswa
                  next: ask_menu
            - if: slots.return_value = "Transaksi Biodata Mahasiswa"
              then: 
                - action: utter_answer_transaksi_biodataMahasiswa
                  next: ask_menu
            - if: slots.return_value = "Hasil Biodata Mahasiswa"
              then: 
                - action: utter_answer_hasil_biodataMahasiswa
                  next: ask_menu
            - else: 
                - action: utter_answer_error_biodataMahasiswa
                  next: ask_menu
