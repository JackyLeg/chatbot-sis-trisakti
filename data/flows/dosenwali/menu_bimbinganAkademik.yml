flows:
  bimbinganAkademik:
      name: Bimbingan Akademik
      description: Help user with Bimbingan Akademik menus
      steps:
        - id: ask_menu
          collect: menu_bimbinganAkademik
          ask_before_filling: true
          description: |
            User must select one of 4 options for Bimbingan Akademik.
            there are options like Prosedur Bimbingan Akademik, Persyaratan Bimbingan Akademik, Transaksi Bimbingan Akademik, and Hasil Bimbingan Akademik.
            while bot not do utter_answer_batal_bimbinganAkademik and if user gets their result, flow will continue to what user want to do next in this menu
          next: menu_confirmation

        - id: menu_confirmation
          collect: menu_bimbinganAkademik_confirmation
          ask_before_filling: true
          next:
          - if: slots.menu_bimbinganAkademik_confirmation is false
            then:
              - action: utter_menu_bimbinganAkademik_cancelled
                next: ask_menu
          - else: continue_flow

        - id: continue_flow
          action: action_menu_bimbinganAkademik
          next:
            - if: slots.return_value = "Prosedur Bimbingan Akademik"
              then: 
                - action: utter_answer_prosedur_bimbinganAkademik
                  next: ask_menu
            - if: slots.return_value = "Persyaratan Bimbingan Akademik"
              then: 
                - action: utter_answer_persyaratan_bimbinganAkademik
                  next: ask_menu
            - if: slots.return_value = "Transaksi Bimbingan Akademik"
              then: 
                - action: utter_answer_transaksi_bimbinganAkademik
                  next: ask_menu
            - if: slots.return_value = "Hasil Bimbingan Akademik"
              then: 
                - action: utter_answer_hasil_bimbinganAkademik
                  next: ask_menu
            - else: 
                - action: utter_answer_error_bimbinganAkademik
                  next: ask_menu
